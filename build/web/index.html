import asyncio
import platform
from pathlib import Path

async def main():
    print("LOG: Starting filesystem initialization")
    bundle = "hackathon_1"
    appdir = Path(f"/data/data/{bundle}")
    appdir.mkdir(exist_ok=True)

    import tarfile
    async with platform.fopen("hackathon_1.tar.gz", "rb") as archive:
        with tarfile.open(fileobj=archive, mode="r:gz") as tar:
            tar.extractall(path=appdir.as_posix())
    
    print("LOG: Filesystem ready")
    platform.run_main(PyConfig, loaderhome=appdir)
    
    # Wait for engine
    import embed
    while embed.counter()<0: await asyncio.sleep(.1)
    
    entry = appdir / "main.py"
    
    # Handle click to start
    if not platform.window.MM.UME:
        platform.window.infobox.innerText = "CLICK HERE TO START GAME"
        platform.window.infobox.style.background = "red"
        while not platform.window.MM.UME: await asyncio.sleep(.1)
    
    platform.window.infobox.style.display = "none"
    await shell.source(entry)

asyncio.run(main())
