import sys
import asyncio
import platform
import json
from pathlib import Path

async def custom_site():
    import embed
    print("LOG: Custom site initialization...")
    platform.document.body.style.background = "#222222"

    bundle = "hackathon_1"
    appdir = Path(f"/data/data/{bundle}")
    appdir.mkdir(exist_ok=True)

    print(f"LOG: Mounting filesystem for {bundle}...")
    
    import tarfile
    try:
        async with platform.fopen("hackathon_1.tar.gz", "rb") as archive:
            print("LOG: Archive opened, extracting...")
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            # Remove filter for compatibility
            tar.extractall(path=appdir.as_posix())
            tar.close()
        print("LOG: Extraction complete.")
    except Exception as e:
        print(f"LOG ERROR: Extraction failed: {e}")

    print("LOG: Starting Pygbag loader...")
    platform.run_main(PyConfig, loaderhome=appdir, loadermain=None)

    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "main.py"
    print(f"LOG: Main path: {main}")

    if not platform.window.MM.UME:
        msg = "Ready to start! Click anywhere to play"
        platform.window.infobox.innerText = msg
        print(f"LOG: {msg}")
        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    print("LOG: Handing over to engine...")
    __import__(__name__).__file__ = str(main)
    await shell.source(main)
    
    platform.window.infobox.style.display = "none"
    print("LOG: Done.")

asyncio.run( custom_site() )
